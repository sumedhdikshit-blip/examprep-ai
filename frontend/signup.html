<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ExamPrep AI</title>
    <meta name="description" content="Register an account on ExamPrep AI and prepare your study documents.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1 class="logo">ExamPrep AI</h1>
            <p class="subtitle">Create an account to start uploading study guides</p>
            <h2>Sign Up</h2>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password (min 6 characters)</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" id="btn-submit">Create Account</button>
            </form>
            
            <div class="auth-switch">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (getToken()) {
            window.location.href = "dashboard.html";
        }

        document.getElementById("signup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const submitBtn = document.getElementById("btn-submit");
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Creating Account...";
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || "Signup failed. Please check inputs.");
                }
                
                setToken(data.access_token);
                showToast("Welcome to ExamPrep AI! Redirecting...", "success");
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } catch (err) {
                showToast(err.message, "error");
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Account";
            }
        });
    </script>
</body>
</html>
